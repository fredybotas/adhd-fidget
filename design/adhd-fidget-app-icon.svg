<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">ADHD Fidget app icon</title>
  <desc id="desc">A blue ball hanging from a white rope on a dark rounded-square background.</desc>
  <defs>
    <linearGradient id="background" x1="160" y1="88" x2="864" y2="936" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#202734"/>
      <stop offset="0.48" stop-color="#111822"/>
      <stop offset="1" stop-color="#071019"/>
    </linearGradient>
    <radialGradient id="ball" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(586 641) rotate(124) scale(156)">
      <stop offset="0" stop-color="#86d7ff"/>
      <stop offset="0.42" stop-color="#2498ff"/>
      <stop offset="1" stop-color="#0565dc"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="24" stdDeviation="26" flood-color="#000000" flood-opacity="0.34"/>
    </filter>
    <filter id="ropeShadow" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="1024" height="1024" rx="224" fill="url(#background)"/>
  <path d="M242 754C338 846 495 891 659 843C774 810 841 730 826 625" fill="none" stroke="#1b2936" stroke-width="34" stroke-linecap="round" opacity="0.55"/>
  <g filter="url(#ropeShadow)">
    <circle cx="512" cy="168" r="36" fill="#f8fbff"/>
    <circle cx="512" cy="168" r="15" fill="#dbe5ef"/>
    <path d="M512 168C548 255 594 377 606 500C612 566 603 625 574 672" fill="none" stroke="#f9fbff" stroke-width="34" stroke-linecap="round"/>
    <path d="M512 168C548 255 594 377 606 500C612 566 603 625 574 672" fill="none" stroke="#dce6ef" stroke-width="10" stroke-linecap="round" opacity="0.72"/>
  </g>
  <g filter="url(#softShadow)">
    <circle cx="574" cy="672" r="148" fill="url(#ball)"/>
    <circle cx="527" cy="617" r="34" fill="#ffffff" opacity="0.38"/>
    <path d="M666 735C625 779 547 798 486 765" fill="none" stroke="#003c9c" stroke-width="16" stroke-linecap="round" opacity="0.25"/>
  </g>
  <path d="M371 328C302 385 264 470 271 559C278 651 331 727 406 771" fill="none" stroke="#ffffff" stroke-width="18" stroke-linecap="round" stroke-dasharray="2 58" opacity="0.2"/>
</svg>
